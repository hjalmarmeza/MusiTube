<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MusiChris Studio | Control Panel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- PWA & Iconos -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="theme-color" content="#0a0a0b">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <header class="hero-section">
        <div class="hero-overlay"></div>
        <img src="assets/hero.png" alt="MusiChris Studio Hero" class="hero-bg">
        <div class="hero-content">
            <div class="trigger-container" style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px;">
                <div class="badge-live">LIVE ENGINE</div>
                <button id="trigger-btn" class="mini-btn-trigger" onclick="runAutopilotNow()" title="Forzar ejecución Autopilot ahora">🚀</button>
            </div>
            <h1>MusiChris <span class="accent">Studio</span></h1>
            <p>Tu discográfica personal en la nube</p>
        </div>
    </header>

    <main id="album-grid">
        <!-- Los álbumes se cargan aquí dinámicamente -->
        <div class="loader">Cargando biblioteca...</div>
    </main>

    <script src="main.js"></script>
</body>
</html>
