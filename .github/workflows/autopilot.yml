name: MusiChris Studio Autopilot

on:
  schedule:
    - cron: '20 21 * * *' # Se ejecuta todos los días a las 21:20 UTC (23:20 España)
  workflow_dispatch: # Permite ejecución manual

jobs:
  auto-process:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🎞️ Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🚀 Run MusiChris Studio Engine
        run: node engine.js
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
          YOUTUBE_CREDENTIALS_JSON: ${{ secrets.YOUTUBE_CREDENTIALS_JSON }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
